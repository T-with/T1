global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'trading-platform'

scrape_configs:
  - job_name: 'trading-platform'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['trading-platform:8080']
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
