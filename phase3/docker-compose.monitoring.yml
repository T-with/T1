# docker-compose.monitoring.yml
#
# 用法:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# 服务:
#   trading-platform: 主 app (来自主 compose)
#   prometheus:       localhost:9090   抓取 trading-platform:8080/metrics
#   grafana:          localhost:3000   (admin/admin 首次登录需改密)
#
# 注意: 监控栈和主 app 之间通过 docker network 内部通信,
#       所以 Prometheus 配置里用 trading-platform:8080 而不是 localhost

services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: trading-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - trading-platform

  grafana:
    image: grafana/grafana:11.3.0
    container_name: trading-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
